<!DOCTYPE html>
{% load static %}
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game</title>
    <style>
        @font-face {
            font-family: 'Balatro';
            src: url("{% static 'memory_game/fonts/m6x11plus.ttf' %}") format('truetype');
        }

        * {
            font-family: 'Balatro', monospace !important;
        }
    </style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="text-white" style="background: #0a0010;">

    <!-- Shader de fondo -->
    <canvas id="bg-shader" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1;"></canvas>

    <!-- Capa CRT encima del contenido -->
    <canvas id="crt-layer"
        style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:999; pointer-events:none;"></canvas>

    <!-- Audio -->
    <audio id="track-principal" src="{% static 'memory_game/audio/Principal.mp3' %}" loop></audio>
    <audio id="track-perfil" src="{% static 'memory_game/audio/Perfil.mp3' %}" loop></audio>

    <nav class="navbar navbar-expand-lg navbar-dark mb-4" style="background: rgba(0,0,0,0.5);">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">🃏 Memory Game</a>
            <div class="navbar-nav ms-auto">
                {% if user.is_authenticated %}
                <a class="nav-link" href="{% url 'seleccionar_nivel' %}">Jugar</a>
                <a class="nav-link" href="{% url 'perfil' %}">Mi Perfil</a>
                <a class="nav-link" href="{% url 'ranking' %}">🏆 Ranking</a>
                <a class="nav-link text-warning" href="{% url 'logout' %}">Salir</a>
                {% else %}
                <a class="nav-link" href="{% url 'login' %}">Iniciar sesión</a>
                <a class="nav-link" href="{% url 'registro' %}">Registrarse</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // ── SHADER DE FONDO ──────────────────────────────────────────
        const canvas = document.getElementById('bg-shader');
        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            gl.viewport(0, 0, canvas.width, canvas.height);
        }
        window.addEventListener('resize', resize);
        resize();

        const vsSource = `
            attribute vec2 a_position;
            void main() {
                gl_Position = vec4(a_position, 0.0, 1.0);
            }
        `;

        const fsSource = `
            precision highp float;
            uniform float time;
            uniform float spin_time;
            uniform vec2  resolution;
            uniform vec4  colour_1;
            uniform vec4  colour_2;
            uniform vec4  colour_3;
            uniform float contrast;
            uniform float spin_amount;

            #define SPIN_EASE 0.5

            void main() {
                float pixel_size = length(resolution) / 700.0;
                vec2 uv = (floor(gl_FragCoord.xy * (1.0/pixel_size)) * pixel_size
                           - 0.5 * resolution) / length(resolution)
                           - vec2(0.12, 0.0);
                float uv_len = length(uv);

                float speed = (spin_time * SPIN_EASE * 0.2) + 302.2;
                float new_pixel_angle = atan(uv.y, uv.x) + speed
                                        - SPIN_EASE * 20.0 * (spin_amount * uv_len + (1.0 - spin_amount));
                vec2 mid = (resolution / length(resolution)) / 2.0;
                uv = vec2(
                    uv_len * cos(new_pixel_angle) + mid.x,
                    uv_len * sin(new_pixel_angle) + mid.y
                ) - mid;

                uv *= 30.0;
                float spd = time * 2.0;
                vec2 uv2 = vec2(uv.x + uv.y);

                for (int i = 0; i < 5; i++) {
                    uv2 += sin(max(uv.x, uv.y)) + uv;
                    uv  += 0.5 * vec2(
                        cos(5.1123314 + 0.353 * uv2.y + spd * 0.131121),
                        sin(uv2.x - 0.113 * spd)
                    );
                    uv  -= cos(uv.x + uv.y) - sin(uv.x * 0.711 - uv.y);
                }

                float contrast_mod = 0.25 * contrast + 0.5 * spin_amount + 1.2;
                float paint_res = min(2.0, max(0.0, length(uv) * 0.035 * contrast_mod));
                float c1p = max(0.0, 1.0 - contrast_mod * abs(1.0 - paint_res));
                float c2p = max(0.0, 1.0 - contrast_mod * abs(paint_res));
                float c3p = 1.0 - min(1.0, c1p + c2p);

                vec4 ret_col = (0.3/contrast) * colour_1
                    + (1.0 - 0.3/contrast) * (
                        colour_1 * c1p +
                        colour_2 * c2p +
                        vec4(c3p * colour_3.rgb, c3p * colour_1.a)
                    );

                gl_FragColor = ret_col;
            }
        `;

        function compileShader(type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            return shader;
        }

        const program = gl.createProgram();
        gl.attachShader(program, compileShader(gl.VERTEX_SHADER, vsSource));
        gl.attachShader(program, compileShader(gl.FRAGMENT_SHADER, fsSource));
        gl.linkProgram(program);
        gl.useProgram(program);

        const vertices = new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]);
        const buf = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buf);
        gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);
        const aPos = gl.getAttribLocation(program, 'a_position');
        gl.enableVertexAttribArray(aPos);
        gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

        const uTime = gl.getUniformLocation(program, 'time');
        const uSpinTime = gl.getUniformLocation(program, 'spin_time');
        const uResolution = gl.getUniformLocation(program, 'resolution');
        const uColour1 = gl.getUniformLocation(program, 'colour_1');
        const uColour2 = gl.getUniformLocation(program, 'colour_2');
        const uColour3 = gl.getUniformLocation(program, 'colour_3');
        const uContrast = gl.getUniformLocation(program, 'contrast');
        const uSpinAmount = gl.getUniformLocation(program, 'spin_amount');

        const paletas = [
            { c1: [0.15, 0.02, 0.25], c2: [0.55, 0.05, 0.10], c3: [0.80, 0.60, 0.10], contrast: 1.2, spin: 0.4 },
            { c1: [0.02, 0.05, 0.30], c2: [0.00, 0.40, 0.55], c3: [0.70, 0.90, 1.00], contrast: 1.1, spin: 0.3 },
            { c1: [0.02, 0.15, 0.05], c2: [0.05, 0.45, 0.15], c3: [0.75, 0.85, 0.10], contrast: 1.3, spin: 0.5 },
            { c1: [0.25, 0.02, 0.02], c2: [0.60, 0.20, 0.00], c3: [0.90, 0.70, 0.10], contrast: 1.2, spin: 0.45 },
            { c1: [0.05, 0.05, 0.08], c2: [0.20, 0.20, 0.25], c3: [0.70, 0.70, 0.80], contrast: 1.4, spin: 0.25 },
            { c1: [0.10, 0.02, 0.30], c2: [0.40, 0.05, 0.50], c3: [0.90, 0.40, 0.70], contrast: 1.1, spin: 0.5 },
        ];

        const p = paletas[Math.floor(Math.random() * paletas.length)];
        gl.uniform4f(uColour1, p.c1[0], p.c1[1], p.c1[2], 1.0);
        gl.uniform4f(uColour2, p.c2[0], p.c2[1], p.c2[2], 1.0);
        gl.uniform4f(uColour3, p.c3[0], p.c3[1], p.c3[2], 1.0);
        gl.uniform1f(uContrast, p.contrast);
        gl.uniform1f(uSpinAmount, p.spin);

        let start = performance.now();

        function render() {
            const t = (performance.now() - start) / 1000.0;
            gl.uniform1f(uTime, t);
            gl.uniform1f(uSpinTime, t);
            gl.uniform2f(uResolution, canvas.width, canvas.height);
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
            requestAnimationFrame(render);
        }
        render();

        // ── CRT OVERLAY ──────────────────────────────────────────────
        const crtCanvas = document.getElementById('crt-layer');
        const crtCtx = crtCanvas.getContext('2d');

        function resizeCRT() {
            crtCanvas.width = window.innerWidth;
            crtCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCRT);
        resizeCRT();

        function renderCRT() {
            const w = crtCanvas.width;
            const h = crtCanvas.height;
            crtCtx.clearRect(0, 0, w, h);

            const imageData = crtCtx.createImageData(w, h);
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                const val = (Math.random() * 2 - 1) * 30;
                data[i] = 128 + val;
                data[i + 1] = 128 + val;
                data[i + 2] = 128 + val;
                data[i + 3] = 20;
            }
            crtCtx.putImageData(imageData, 0, 0);

            crtCtx.fillStyle = 'rgba(0, 0, 0, 0.18)';
            for (let y = 0; y < h; y += 3) {
                crtCtx.fillRect(0, y, w, 1);
            }

            const vignette = crtCtx.createRadialGradient(
                w / 2, h / 2, h * 0.25,
                w / 2, h / 2, h * 0.80
            );
            vignette.addColorStop(0, 'rgba(0,0,0,0)');
            vignette.addColorStop(1, 'rgba(0,0,0,0.55)');
            crtCtx.fillStyle = vignette;
            crtCtx.fillRect(0, 0, w, h);

            requestAnimationFrame(renderCRT);
        }
        renderCRT();

        // ── SISTEMA DE AUDIO ─────────────────────────────────────────
        const trackPrincipal = document.getElementById('track-principal');
        const trackPerfil = document.getElementById('track-perfil');

        const esPerfil = window.location.pathname.startsWith('/juego/perfil/');

        trackPrincipal.volume = 0;
        trackPerfil.volume = 0;

        setInterval(() => {
            localStorage.setItem('principal_time', trackPrincipal.currentTime);
            localStorage.setItem('perfil_time', trackPerfil.currentTime);
        }, 1000);

        function fadeTrack(track, targetVol, duracionMs) {
            const pasos = 40;
            const intervalo = duracionMs / pasos;
            const delta = (targetVol - track.volume) / pasos;
            let paso = 0;
            const id = setInterval(() => {
                paso++;
                track.volume = Math.min(1, Math.max(0, track.volume + delta));
                if (paso >= pasos) clearInterval(id);
            }, intervalo);
        }

        function arrancarAmbas() {
            trackPrincipal.currentTime = parseFloat(localStorage.getItem('principal_time') || '0');
            trackPerfil.currentTime = parseFloat(localStorage.getItem('perfil_time') || '0');

            trackPrincipal.play().catch(() => { });
            trackPerfil.play().catch(() => { });

            if (esPerfil) {
                fadeTrack(trackPerfil, 1.0, 1500);
            } else {
                fadeTrack(trackPrincipal, 1.0, 100);
            }

            document.removeEventListener('click', arrancarAmbas);
            document.removeEventListener('keydown', arrancarAmbas);
        }

        // ── PRECARGA AGRESIVA DE AUDIO ENTRE PÁGINAS ─────────────────
        document.querySelectorAll('a[href]').forEach(link => {
            link.addEventListener('click', function (e) {
                const href = this.getAttribute('href');
                if (!href || href.startsWith('http') || href.startsWith('#')) return;

                e.preventDefault();

                localStorage.setItem('principal_time', trackPrincipal.currentTime);
                localStorage.setItem('perfil_time', trackPerfil.currentTime);

                const vaAPerfil = href.startsWith('/juego/perfil');
                const saleDePerfil = esPerfil && !vaAPerfil;

                if (vaAPerfil || saleDePerfil) {
                    fadeTrack(trackPrincipal, 0.0, 800);
                    fadeTrack(trackPerfil, 0.0, 800);
                    setTimeout(() => { window.location.href = href; }, 850);
                } else {
                    setTimeout(() => { window.location.href = href; }, 80);
                }
            });
        });

        const testPlay = trackPrincipal.play();
        if (testPlay !== undefined) {
            testPlay.then(() => {
                trackPrincipal.pause();
                arrancarAmbas();
            }).catch(() => {
                document.addEventListener('click', arrancarAmbas, { once: true });
                document.addEventListener('keydown', arrancarAmbas, { once: true });
            });
        }
    </script>

</body>

</html>
